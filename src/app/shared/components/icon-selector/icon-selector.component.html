<div>
    <p-iconfield>
        <p-inputicon styleClass="pi pi-chevron-down cursor-pointer hover:text-blue-500 transition-colors"
            (click)="toggle($event)" />
        <input pInputText [value]="value" [placeholder]="placeholder" (input)="onInput($event)" class="w-full"
            [disabled]="isDisabled" />
    </p-iconfield>
</div>

<p-popover #iconPanel [style]="{ width: '320px', padding: '0' }">
    <div class="p-3 max-h-[300px] overflow-y-auto">
        @for (category of emojiCategories; track category.name) {
        <div class="mb-3 last:mb-0">
            <h6 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-1">
                {{ category.name }}
            </h6>
            <div class="grid grid-cols-6 gap-1">
                @for (emoji of category.emojis; track emoji) {
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors text-xl"
                    [class.bg-blue-50]="value === emoji" [class.border-blue-200]="value === emoji"
                    [class.border]="value === emoji" (click)="selectIcon(emoji)">
                    {{ emoji }}
                </button>
                }
            </div>
        </div>
        }
    </div>
</p-popover>
