<div class="flex items-center gap-3">
    <button pButton type="button" (click)="toggle($event)"
        class="w-12 h-12 !p-0 flex items-center justify-center !rounded-xl !bg-gray-50 !border !border-gray-200 hover:!bg-gray-100 hover:!border-gray-300 transition-all">
        <span class="text-2xl">{{ currentIcon }}</span>
    </button>
    <span class="text-sm text-gray-500">
        <ng-content select="[label]"></ng-content>
    </span>
</div>

<p-popover #iconPanel [style]="{ width: '320px', padding: '0' }">
    <div class="p-3 max-h-[300px] overflow-y-auto">
        @for (category of emojiCategories; track category.name) {
        <div class="mb-3 last:mb-0">
            <h6 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-1">
                {{ category.name }}
            </h6>
            <div class="grid grid-cols-6 gap-1">
                @for (emoji of category.emojis; track emoji) {
                <button
                    class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors text-xl"
                    [class.bg-blue-50]="currentIcon === emoji" [class.border-blue-200]="currentIcon === emoji"
                    [class.border]="currentIcon === emoji" (click)="selectIcon(emoji)">
                    {{ emoji }}
                </button>
                }
            </div>
        </div>
        }
    </div>
</p-popover>
