<section class="py-16 md:py-24 px-4 bg-white" id="como-funciona">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-12 md:mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
        ¿Cómo funciona?
      </h2>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto">
        Tres pasos simples para comenzar a controlar tus finanzas
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
      <!-- Step 1 -->
      <div class="relative">
        <div class="absolute -top-4 -left-4 md:top-0 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg z-10">
          1
        </div>
        <p-card styleClass="h-full pt-8 md:pt-6 text-center shadow-md hover:shadow-lg transition-shadow border border-gray-100">
          <ng-template pTemplate="content">
            <div class="flex flex-col items-center">
              <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                <i class="pi pi-user-plus text-green-600 text-2xl"></i>
              </div>
              <h3 class="text-xl font-semibold text-gray-900 mb-3">Crea tu cuenta</h3>
              <p class="text-gray-600">
                Regístrate en menos de 1 minuto con tu número de WhatsApp
              </p>
            </div>
          </ng-template>
        </p-card>
      </div>

      <!-- Step 2 -->
      <div class="relative">
        <div class="absolute -top-4 -left-4 md:top-0 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg z-10">
          2
        </div>
        <p-card styleClass="h-full pt-8 md:pt-6 text-center shadow-md hover:shadow-lg transition-shadow border border-gray-100">
          <ng-template pTemplate="content">
            <div class="flex flex-col items-center">
              <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                <i class="pi pi-whatsapp text-green-600 text-2xl"></i>
              </div>
              <h3 class="text-xl font-semibold text-gray-900 mb-3">Escríbenos</h3>
              <p class="text-gray-600">
                Envía un mensaje a nuestro número y activa tu asistente
              </p>
            </div>
          </ng-template>
        </p-card>
      </div>

      <!-- Step 3 -->
      <div class="relative">
        <div class="absolute -top-4 -left-4 md:top-0 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg z-10">
          3
        </div>
        <p-card styleClass="h-full pt-8 md:pt-6 text-center shadow-md hover:shadow-lg transition-shadow border border-gray-100">
          <ng-template pTemplate="content">
            <div class="flex flex-col items-center">
              <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                <i class="pi pi-chart-line text-green-600 text-2xl"></i>
              </div>
              <h3 class="text-xl font-semibold text-gray-900 mb-3">¡Listo!</h3>
              <p class="text-gray-600">
                Registra gastos, ingresos y consulta reportes cuando quieras
              </p>
            </div>
          </ng-template>
        </p-card>
      </div>
    </div>
  </div>
</section>
