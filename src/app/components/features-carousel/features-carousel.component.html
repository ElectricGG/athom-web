<section class="py-16 md:py-24 px-4 bg-gradient-to-br transition-colors duration-700"
  [ngClass]="activeFeature.bgGradient" id="funcionalidades">
  <div class="max-w-6xl mx-auto">

    <!-- Tabs -->
    <div class="flex justify-center mb-10 md:mb-14">
      <div class="flex gap-2 overflow-x-auto pb-2 px-2 scrollbar-hide max-w-full">
        <button *ngFor="let feature of features; let i = index"
          (click)="setFeature(i)"
          class="flex items-center gap-2 px-4 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-all duration-300 border"
          [ngClass]="i === activeIndex
            ? feature.tabActiveBg + ' ' + feature.tabActiveText + ' border-transparent shadow-md scale-105'
            : 'bg-white/70 text-gray-500 border-gray-200 hover:bg-white hover:text-gray-700'">
          <i [class]="feature.icon + ' text-sm'"></i>
          <span>{{ feature.label }}</span>
        </button>
      </div>
    </div>

    <!-- Content Area with Grid Overlay Transitions -->
    <div class="grid">
      <div *ngFor="let feature of features; let i = index"
        class="col-start-1 row-start-1 transition-all duration-700"
        [ngClass]="i === activeIndex ? 'opacity-100 translate-y-0 z-10' : 'opacity-0 translate-y-4 pointer-events-none z-0'">

        <div class="flex flex-col lg:flex-row items-center gap-8 lg:gap-16">

          <!-- Text Content -->
          <div class="flex-1 text-center lg:text-left">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium mb-4"
              [ngClass]="feature.badgeBg + ' ' + feature.badgeText">
              <i [class]="feature.icon"></i>
              <span>{{ feature.label }}</span>
            </div>

            <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
              {{ feature.title }}
            </h2>

            <p class="text-lg text-gray-600 mb-6 max-w-lg mx-auto lg:mx-0">
              {{ feature.description }}
            </p>

            <ul class="space-y-3 text-left max-w-md mx-auto lg:mx-0">
              <li *ngFor="let bullet of feature.bullets" class="flex items-start gap-3">
                <i [class]="bullet.icon + ' text-xl mt-0.5 ' + bullet.iconColor"></i>
                <span class="text-gray-700">{{ bullet.text }}</span>
              </li>
            </ul>
          </div>

          <!-- Chat Mockup -->
          <div class="flex-1 w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
              <div class="bg-[#075E54] px-4 py-3">
                <p class="text-white font-medium text-sm">{{ feature.chatTitle }}</p>
              </div>
              <div class="bg-[#ECE5DD] p-4 space-y-4">
                <div *ngFor="let example of feature.chatExamples" class="space-y-2">
                  <!-- User message -->
                  <div class="flex justify-end">
                    <div class="bg-[#DCF8C6] rounded-lg rounded-tr-none px-4 py-2 max-w-[85%] shadow">
                      <p class="text-sm text-gray-800">{{ example.message }}</p>
                    </div>
                  </div>
                  <!-- Bot response -->
                  <div class="flex justify-start">
                    <div class="bg-white rounded-lg rounded-tl-none px-4 py-2 max-w-[90%] shadow">
                      <p class="text-sm text-gray-800 whitespace-pre-line">{{ example.response }}</p>
                    </div>
                  </div>
                </div>

                <!-- Extra alert for budgets -->
                <div *ngIf="feature.extraChat" class="flex justify-start">
                  <div class="bg-yellow-50 border-l-4 border-yellow-400 rounded-lg rounded-tl-none px-4 py-2 max-w-[90%] shadow">
                    <p class="text-sm text-yellow-800 whitespace-pre-line">{{ feature.extraChat }}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Progress Dots -->
    <div class="flex justify-center mt-10 gap-2">
      <button *ngFor="let feature of features; let i = index"
        (click)="setFeature(i)"
        class="h-2 rounded-full transition-all duration-300"
        [ngClass]="i === activeIndex ? 'w-8 bg-gray-800' : 'w-2 bg-gray-300 hover:bg-gray-400'">
      </button>
    </div>

  </div>
</section>
