<p-toast />
<p-confirmDialog />

<div class="p-4 lg:p-6 space-y-6">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-2xl lg:text-3xl font-bold text-gray-900">Categorías</h1>
            <p class="text-gray-500 mt-1">Gestiona las categorías de tus ingresos y gastos</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-3">
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                    placeholder="Buscar..." class="w-full sm:w-64" />
            </p-iconfield>
            <p-button label="Nueva categoría" icon="pi pi-plus" severity="success" (onClick)="abrirDialogoNuevo()" />
        </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <p-table #dt [value]="categorias" [loading]="isLoading" styleClass="p-datatable-sm"
            [globalFilterFields]="['nombreCategoria', 'tipoCategoria', 'etiqueta']">
            <ng-template pTemplate="header">
                <tr>
                    <th class="w-16">Icono</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Etiqueta</th>
                    <th class="text-right">Acciones</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-cat>
                <tr class="hover:bg-gray-50 transition-colors">
                    <td>
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl"
                            [style.backgroundColor]="(cat.color || '#3b82f6') + '20'">
                            {{ cat.icono || '🏷️' }}
                        </div>
                    </td>
                    <td class="font-medium text-gray-900">{{ cat.nombreCategoria }}</td>
                    <td>
                        <p-tag [value]="cat.tipoCategoria" [severity]="getBadgeSeverity(cat.tipoCategoria)"
                            [rounded]="true" />
                    </td>
                    <td>
                        <span class="text-gray-500 text-sm">{{ cat.etiqueta || '-' }}</span>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <button
                                class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"
                                (click)="abrirDialogoEditar(cat)">
                                <i class="pi pi-pencil text-sm"></i>
                            </button>
                            <button
                                class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                (click)="confirmarEliminar(cat)">
                                <i class="pi pi-trash text-sm"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="5" class="text-center p-8 text-gray-500">
                        No hay categorías registradas.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<!-- Dialog -->
<p-dialog [header]="isEditing ? 'Editar categoría' : 'Nueva categoría'" [(visible)]="showDialog" [modal]="true"
    [style]="{ width: '450px' }" [draggable]="false" [resizable]="false">
    <form [formGroup]="form" class="space-y-4 pt-2">
        <!-- Nombre -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nombre <span
                    class="text-red-500">*</span></label>
            <input pInputText formControlName="nombreCategoria" class="w-full" placeholder="Ej: Comida, Transporte" />
        </div>

        <!-- Tipo -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Tipo</label>
            <p-select formControlName="tipoCategoria" [options]="tipos" optionLabel="label" optionValue="value"
                styleClass="w-full" appendTo="body" />
        </div>

        <!-- Icono -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Icono</label>
            <app-icon-selector formControlName="icono" placeholder="Selecciona un icono" />
        </div>

        <!-- Color -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Color</label>
            <div class="flex flex-wrap gap-2">
                @for (c of colors; track c) {
                <button type="button" class="w-8 h-8 rounded-full border-2 hover:scale-110 transition-transform"
                    [style.backgroundColor]="c" [class.border-gray-900]="form.get('color')?.value === c"
                    [class.border-transparent]="form.get('color')?.value !== c" (click)="seleccionarColor(c)"></button>
                }
            </div>
        </div>
    </form>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="showDialog = false"
            [disabled]="isSaving" />
        <p-button [label]="isEditing ? 'Guardar cambios' : 'Crear categoría'" severity="success" (onClick)="guardar()"
            [loading]="isSaving" [disabled]="form.invalid" />
    </ng-template>
</p-dialog>
