<!-- Mobile Header -->
<header
  class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-white border-b border-gray-200 px-4 h-16 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <button (click)="sidebarVisible.set(true)"
      class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
      <i class="pi pi-bars text-xl"></i>
    </button>
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
        <i class="pi pi-wallet text-white text-sm"></i>
      </div>
      <span class="font-bold text-gray-900">Athom</span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button
      class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
      <i class="pi pi-bell text-lg"></i>
    </button>
  </div>
</header>

<!-- Desktop Sidebar -->
<aside class="hidden lg:flex fixed top-0 left-0 bottom-0 w-64 bg-white border-r border-gray-200 flex-col z-50">
  <ng-container *ngTemplateOutlet="sidebarContent"></ng-container>
</aside>

<!-- Mobile Sidebar (Drawer) -->
<p-drawer [(visible)]="sidebarVisible" [modal]="true" position="left" styleClass="w-72" [showCloseIcon]="false">
  <ng-container *ngTemplateOutlet="sidebarContent"></ng-container>
</p-drawer>

<!-- Sidebar Content Template -->
<ng-template #sidebarContent>
  <div class="flex flex-col h-full">
    <!-- Logo -->
    <div class="p-4 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center">
          <i class="pi pi-wallet text-white text-lg"></i>
        </div>
        <div>
          <span class="font-bold text-gray-900 text-lg">Athom</span>
          <p class="text-xs text-gray-500">Panel de control</p>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto p-4 space-y-6">
      <!-- Principal -->
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-3">Principal</p>
        <ul class="space-y-1">
          <li>
            <a routerLink="/dashboard" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              [routerLinkActiveOptions]="{exact: true}"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-home text-lg"></i>
              <span class="font-medium">Dashboard</span>
            </a>
          </li>
          <li>
            <a routerLink="/dashboard/ingresos" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-arrow-up text-lg"></i>
              <span class="font-medium">Ingresos</span>
            </a>
          </li>
          <li>
            <a routerLink="/dashboard/gastos" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-arrow-down text-lg"></i>
              <span class="font-medium">Gastos</span>
            </a>
          </li>
          <li>
            <a routerLink="/dashboard/presupuestos" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-calculator text-lg"></i>
              <span class="font-medium">Presupuestos</span>
            </a>
          </li>
          <li>
            <a routerLink="/dashboard/categorias" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-tags text-lg"></i>
              <span class="font-medium">Categorías</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Planificación -->
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-3">Planificación</p>
        <ul class="space-y-1">
          <li>
            <a routerLink="/dashboard/metas" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-flag text-lg"></i>
              <span class="font-medium">Metas</span>
            </a>
          </li>
          <li>
            <a routerLink="/dashboard/recordatorios" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-clock text-lg"></i>
              <span class="font-medium">Recordatorios</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- IA -->
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-3">IA</p>
        <ul class="space-y-1">
          <li>
            <a routerLink="/dashboard/asesoria-ia" routerLinkActive="bg-green-50 text-green-700 border-green-500"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-2 border-transparent"
              (click)="closeSidebar()">
              <i class="pi pi-sparkles text-lg"></i>
              <span class="font-medium">Asesoría IA</span>
              <span
                class="ml-auto px-2 py-0.5 text-xs bg-green-100 text-green-700 rounded-full font-semibold">Nuevo</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- User Section -->
    <div class="border-t border-gray-100 p-4 relative">
      <!-- Clickable User Info -->
      <button (click)="toggleUserMenu()"
        class="w-full flex items-center gap-3 p-2 rounded-xl hover:bg-gray-50 transition-all duration-200 group">
        <div class="relative">
          <div
            class="w-10 h-10 bg-gradient-to-br from-green-500 to-emerald-600 rounded-full flex items-center justify-center text-white font-bold shadow-md group-hover:shadow-lg transition-shadow">
            {{ userInitial$ | async }}
          </div>
          @if (userPlan === 'premium') {
          <div
            class="absolute -top-1 -right-1 w-4 h-4 bg-gradient-to-r from-amber-400 to-orange-500 rounded-full flex items-center justify-center">
            <i class="pi pi-star-fill text-white text-[8px]"></i>
          </div>
          }
        </div>
        <div class="flex-1 min-w-0 text-left">
          <p class="font-semibold text-gray-900 truncate text-sm">{{ userName$ | async }}</p>
          <div class="flex items-center gap-1">
            @if (userPlan === 'premium') {
            <span class="text-xs text-amber-600 font-medium flex items-center gap-1">
              <i class="pi pi-star-fill text-[10px]"></i>Premium
            </span>
            } @else {
            <span class="text-xs text-gray-500">Plan Gratis</span>
            }
          </div>
        </div>
        <i class="pi pi-chevron-up text-gray-400 text-xs transition-transform duration-200"
          [class.rotate-180]="!userMenuVisible()"></i>
      </button>

      <!-- Dropdown Menu (appears above) -->
      @if (userMenuVisible()) {
      <div
        class="absolute bottom-full left-4 right-4 mb-2 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50">
        <!-- Menu Items -->
        <a routerLink="/dashboard/settings" (click)="closeUserMenu(); closeSidebar()"
          class="flex items-center gap-3 px-4 py-2.5 text-gray-700 hover:bg-gray-50 transition-colors">
          <i class="pi pi-cog text-gray-400"></i>
          <span class="font-medium">Configuración</span>
        </a>

        <!-- Logout -->
        <div class="border-t border-gray-100 mt-2 pt-2">
          <button (click)="logout(); closeSidebar()"
            class="w-full flex items-center gap-3 px-4 py-2.5 text-red-600 hover:bg-red-50 transition-colors">
            <i class="pi pi-sign-out"></i>
            <span class="font-medium">Cerrar sesión</span>
          </button>
        </div>
      </div>
      }
    </div>
  </div>
</ng-template>

<!-- Overlay to close menu when clicking outside -->
@if (userMenuVisible()) {
<div class="fixed inset-0 z-40" (click)="closeUserMenu()"></div>
}

<!-- Main Content -->
<main class="lg:ml-64 min-h-screen bg-slate-100">
  <div class="pt-16 lg:pt-0">
    <router-outlet></router-outlet>
  </div>
</main>
